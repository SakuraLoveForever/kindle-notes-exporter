<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kindle笔记导出工具 - 免费在线版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }
        
        .header h1 { font-size: 2.5em; margin-bottom: 10px; }
        .header p { opacity: 0.9; font-size: 1.1em; }
        
        .content { padding: 40px; }
        
        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 60px 40px;
            text-align: center;
            background: #f8f9ff;
            transition: all 0.3s ease;
            cursor: pointer;
            margin-bottom: 30px;
        }
        
        .upload-area:hover {
            background: #eef0ff;
            border-color: #764ba2;
            transform: translateY(-2px);
        }
        
        .upload-icon { font-size: 4em; margin-bottom: 20px; }
        .upload-text { font-size: 1.3em; color: #555; margin-bottom: 15px; }
        .upload-hint { color: #888; font-size: 0.9em; }
        
        input[type="file"] { display: none; }
        
        .books-section { display: none; }
        .books-section.active { display: block; animation: fadeIn 0.5s ease; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .stats {
            background: #f0f0f0;
            padding: 15px 25px;
            border-radius: 10px;
            margin-bottom: 25px;
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }
        
        .stat-item { display: flex; align-items: center; gap: 8px; }
        .stat-number { font-size: 1.5em; font-weight: bold; color: #667eea; }
        .stat-label { color: #666; }
        
        .global-actions { display: flex; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; }
        
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        
        .btn-secondary { background: #f0f0f0; color: #555; }
        .btn-secondary:hover { background: #e0e0e0; transform: translateY(-2px); }
        
        .book-card {
            background: #f8f9ff;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
            transition: all 0.3s ease;
        }
        
        .book-card:hover { transform: translateX(5px); box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        
        .book-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .book-title { font-size: 1.3em; color: #333; font-weight: 600; }
        .book-meta { color: #888; font-size: 0.9em; }
        .book-actions { display: flex; gap: 10px; }
        .btn-small { padding: 8px 16px; font-size: 0.9em; }
        
        .notes-preview {
            background: white;
            border-radius: 8px;
            padding: 15px;
            max-height: 200px;
            overflow-y: auto;
            font-family: "Courier New", monospace;
            font-size: 0.9em;
            line-height: 1.6;
            color: #555;
            border: 1px solid #e0e0e0;
        }
        
        .preview-line { margin: 2px 0; }
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #333;
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
        }
        
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        
        .footer {
            text-align: center;
            padding: 20px;
            color: #888;
            font-size: 0.9em;
            border-top: 1px solid #eee;
        }
        
        @media (max-width: 600px) {
            .header h1 { font-size: 1.8em; }
            .content { padding: 20px; }
            .upload-area { padding: 40px 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 Kindle笔记导出工具</h1>
            <p>免费在线工具，本地处理保护隐私</p>
        </div>
        
        <div class="content">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📤</div>
                <div class="upload-text">点击或拖拽上传 My Clippings.txt</div>
                <div class="upload-hint">支持 Kindle 导出的笔记文件</div>
                <input type="file" id="fileInput" accept=".txt">
            </div>
            
            <div class="books-section" id="booksSection">
                <div class="stats">
                    <div class="stat-item">
                        <span class="stat-number" id="bookCount">0</span>
                        <span class="stat-label">本书籍</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-number" id="noteCount">0</span>
                        <span class="stat-label">条笔记</span>
                    </div>
                </div>
                
                <div class="global-actions">
                    <button class="btn btn-primary" onclick="exportAll()">📦 统一导出全部</button>
                    <button class="btn btn-secondary" onclick="resetAll()">🗑️ 清空重置</button>
                </div>
                
                <div id="booksList"></div>
            </div>
        </div>
        
        <div class="footer">
            <p>🔒 纯本地处理，文件不会上传到服务器 | 免费开源工具</p>
        </div>
    </div>
    
    <div class="toast" id="toast"></div>
    
    <script>
        let booksData = {};
        
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const booksSection = document.getElementById('booksSection');
        const toast = document.getElementById('toast');
        
        uploadArea.addEventListener('click', () => fileInput.click());
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.style.background = '#e0e4ff';
            uploadArea.style.borderColor = '#764ba2';
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.style.background = '#f8f9ff';
            uploadArea.style.borderColor = '#667eea';
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.background = '#f8f9ff';
            uploadArea.style.borderColor = '#667eea';
            const file = e.dataTransfer.files[0];
            if (file && file.name.endsWith('.txt')) {
                processFile(file);
            } else {
                showToast('请上传 .txt 格式的文件');
            }
        });
        
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                processFile(e.target.files[0]);
            }
        });
        
        function processFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const content = e.target.result;
                parseClippings(content);
            };
            reader.readAsText(file, 'UTF-8');
        }
        
        function parseClippings(content) {
            booksData = {};
            const entries = content.split('==========');
            
            entries.forEach(entry => {
                const lines = entry.trim().split('\n').map(l => l.trim()).filter(l => l);
                if (lines.length < 2) return;
                
                const firstLine = lines[0];
                const bookMatch = firstLine.match(/^(.+?)\s*\((.+?)\)/);
                
                let bookName, author;
                if (bookMatch) {
                    bookName = bookMatch[1].trim();
                    author = bookMatch[2].trim();
                } else {
                    bookName = firstLine.trim();
                    author = '未知作者';
                }
                
                let noteLines = [];
                for (let i = 2; i < lines.length; i++) {
                    if (lines[i] && !lines[i].startsWith('-') && !lines[i].startsWith('您在位置')) {
                        noteLines.push(lines[i]);
                    }
                }
                
                const noteContent = noteLines.join('\n').trim();
                if (!noteContent) return;
                
                if (!booksData[bookName]) {
                    booksData[bookName] = { author: author, notes: [] };
                }
                booksData[bookName].notes.push(noteContent);
            });
            
            displayBooks();
            showToast(`成功解析 ${Object.keys(booksData).length} 本书籍`);
        }
        
        function displayBooks() {
            const booksList = document.getElementById('booksList');
            const bookCount = document.getElementById('bookCount');
            const noteCount = document.getElementById('noteCount');
            
            let totalNotes = 0;
            let html = '';
            
            for (const [bookName, data] of Object.entries(booksData)) {
                totalNotes += data.notes.length;
                
                const preview = data.notes.slice(0, 3).map((note, idx) => {
                    const shortNote = note.length > 80 ? note.substring(0, 80) + '...' : note;
                    return `<div class="preview-line">${idx + 1}. ${escapeHtml(shortNote)}</div>`;
                }).join('');
                
                html += `
                    <div class="book-card">
                        <div class="book-header">
                            <div>
                                <div class="book-title">${escapeHtml(bookName)}</div>
                                <div class="book-meta">${escapeHtml(data.author)} · ${data.notes.length} 条笔记</div>
                            </div>
                            <div class="book-actions">
                                <button class="btn btn-primary btn-small" onclick="exportBook('${escapeJs(bookName)}')">
                                    ⬇️ 导出
                                </button>
                            </div>
                        </div>
                        <div class="notes-preview">
                            ${preview}
                            ${data.notes.length > 3 ? `<div class="preview-line">... 还有 ${data.notes.length - 3} 条笔记</div>` : ''}
                        </div>
                    </div>
                `;
            }
            
            booksList.innerHTML = html;
            bookCount.textContent = Object.keys(booksData).length;
            noteCount.textContent = totalNotes;
            booksSection.classList.add('active');
        }
        
        function exportBook(bookName) {
            const data = booksData[bookName];
            if (!data) return;
            
            let content = bookName + '\n\n';
            data.notes.forEach((note, idx) => {
                content += `${idx + 1}. ${note}\n\n`;
            });
            
            downloadFile(content, `${sanitizeFilename(bookName)}_笔记.txt`);
            showToast(`《${bookName}》导出成功`);
        }
        
        function exportAll() {
            let content = '';
            let isFirst = true;
            
            for (const [bookName, data] of Object.entries(booksData)) {
                if (!isFirst) {
                    content += '\n\n==================\n\n';
                }
                isFirst = false;
                
                content += bookName + '\n\n';
                data.notes.forEach((note, idx) => {
                    content += `${idx + 1}. ${note}\n\n`;
                });
            }
            
            downloadFile(content, 'Kindle笔记合集.txt');
            showToast('全部笔记导出成功');
        }
        
        function downloadFile(content, filename) {
            const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
        
        function resetAll() {
            booksData = {};
            booksSection.classList.remove('active');
            fileInput.value = '';
            showToast('已重置，请上传新文件');
        }
        
        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function escapeJs(text) {
            return text.replace(/'/g, "\\'").replace(/"/g, '\\"');
        }
        
        function sanitizeFilename(name) {
            return name.replace(/[<>:\"/\\|?*]/g, '_').substring(0, 50);
        }
    </script>
</body>
</html>
